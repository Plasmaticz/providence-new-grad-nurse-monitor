name: Send daily Providence job digest

on:
  schedule:
    - cron: "7 16 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: providence-daily-discord
  cancel-in-progress: true

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Fetch current Providence jobs
        run: node scripts/fetch-current-jobs.mjs "$RUNNER_TEMP/current_jobs.json"

      - name: Send Discord digest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/send-discord.mjs daily "$RUNNER_TEMP/current_jobs.json"
