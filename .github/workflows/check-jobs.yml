name: Check Providence new-grad nurse jobs

on:
  schedule:
    - cron: "2-57/5 * * * *"
  workflow_dispatch:
    inputs:
      send_current_jobs:
        description: Send an issue for all current jobs instead of creating a quiet baseline
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: providence-new-grad-monitor
  cancel-in-progress: false

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          package-manager-cache: false

      - name: Check Providence jobs
        id: monitor
        env:
          ALERT_CURRENT: ${{ inputs.send_current_jobs || 'false' }}
        run: |
          extra_args=""
          if [ "$ALERT_CURRENT" = "true" ]; then
            extra_args="--alert-current"
          fi
          node scripts/check-jobs.mjs \
            --state data/seen_jobs.json \
            --alert-file "$RUNNER_TEMP/new_jobs.md" \
            --new-jobs-file "$RUNNER_TEMP/new_jobs.json" \
            --readme README.md \
            $extra_args

      - name: Create email-triggering GitHub issue
        if: steps.monitor.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/create-issue.mjs
          "$RUNNER_TEMP/new_jobs.md"
          "${{ steps.monitor.outputs.new_count }}"

      - name: Send Discord notification
        if: steps.monitor.outputs.new_count != '0'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node scripts/send-discord.mjs new "$RUNNER_TEMP/new_jobs.json"

      - name: Save current listings and seen job IDs
        if: steps.monitor.outputs.repo_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen_jobs.json README.md
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: update Providence job listings [skip ci]"
          git push

      - name: Add run summary
        if: always()
        env:
          CURRENT_COUNT: ${{ steps.monitor.outputs.current_count }}
          NEW_COUNT: ${{ steps.monitor.outputs.new_count }}
        run: |
          echo "## Providence new-grad nurse monitor" >> "$GITHUB_STEP_SUMMARY"
          echo "Current matching jobs: ${CURRENT_COUNT:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "New jobs: ${NEW_COUNT:-unknown}" >> "$GITHUB_STEP_SUMMARY"
